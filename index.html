<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA MEGADRIVE</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #2b2b2b;
    color: #fff;
    font-family: "Comic Sans MS", "Marker Felt", cursive, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: center;
  }
  h1 {
    margin: 6px 0;
    font-size: 28px;
    color: #ffe14d;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #c0392b;
    letter-spacing: 2px;
  }
  #game {
    background: #6ab04c;
    border: 6px solid #000;
    border-radius: 4px;
    image-rendering: pixelated;
    touch-action: none;
  }
  #hint {
    font-size: 13px;
    color: #ccc;
    margin-top: 6px;
    text-align: center;
  }
  .controls {
    display: flex;
    gap: 24px;
    margin-top: 8px;
    align-items: center;
  }
  .controls button {
    width: 90px;
    height: 60px;
    font-size: 30px;
    font-weight: bold;
    background: #e67e22;
    color: #fff;
    border: 4px solid #000;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
  }
  .controls button:active { background: #d35400; }
  #muteBtn {
    width: 60px;
    height: 60px;
    font-size: 24px;
    background: #34495e;
  }
  #muteBtn:active { background: #2c3e50; }
</style>
</head>
<body>
<div id="wrap">
  <h1>🚗 GTA MEGADRIVE 🌴</h1>
  <canvas id="game" width="400" height="600"></canvas>
  <div id="hint">◀ / ▶ or A / D to steer &nbsp;•&nbsp; Grab 💵 cash piles &nbsp;•&nbsp; Hitting people brings the cops &nbsp;•&nbsp; Lure police into rocks &amp; palm trees</div>
  <div class="controls">
    <button id="leftBtn">◀</button>
    <button id="muteBtn">🔊</button>
    <button id="rightBtn">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---- Road layout ----
const ROAD_X = 60;
const ROAD_W = 280;
const ROAD_R = ROAD_X + ROAD_W;

// ============================================================
//  AUDIO  (blip-blop chiptune + sound effects, Web Audio API)
// ============================================================
const Audio = (() => {
  let actx = null, master = null, muted = false, seqTimer = null, step = 0;
  const BASE_STEP_MS = 140;     // music tempo at normal speed
  let stepMs = BASE_STEP_MS;    // current tempo (shrinks as the car speeds up)
  const N = {C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,B3:246.94,
             C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,
             C5:523.25,D5:587.33,E5:659.25,_:0};
  const melody = [N.C5,N._,N.G4,N._, N.A4,N._,N.E4,N._, N.F4,N._,N.C5,N._, N.G4,N.A4,N.B4,N._];
  const bass   = [N.C3,N.C3,N.G3,N._, N.A3,N.A3,N.E3,N._, N.F3,N.F3,N.C3,N._, N.G3,N.G3,N.G3,N._];

  function ensure() {
    if (actx) return;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain();
    master.gain.value = muted ? 0 : 0.18;
    master.connect(actx.destination);
  }

  function tone(freq, when, dur, type, vol) {
    if (!freq) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(master);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.linearRampToValueAtTime(vol, when + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    o.start(when); o.stop(when + dur + 0.02);
  }

  function noise(dur, vol, freq) {
    const buf = actx.createBuffer(1, Math.floor(actx.sampleRate * dur), actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = actx.createBufferSource(); src.buffer = buf;
    const g = actx.createGain(); const f = actx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = freq || 1000;
    const now = actx.currentTime;
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    src.connect(f); f.connect(g); g.connect(master);
    src.start();
  }

  function nextStep() {
    const t = actx.currentTime + 0.02;
    const d = stepMs / BASE_STEP_MS;   // scale note length with tempo
    tone(melody[step], t, 0.12 * d, 'square', 0.12);
    tone(bass[step],   t, 0.16 * d, 'triangle', 0.22);
    step = (step + 1) % melody.length;
    seqTimer = setTimeout(nextStep, stepMs);   // self-scheduling, reads live tempo
  }
  function startMusic() {
    ensure();
    if (seqTimer) return;
    step = 0;
    nextStep();
  }
  function stopMusic() { if (seqTimer) { clearTimeout(seqTimer); seqTimer = null; } }

  return {
    resume() { ensure(); if (actx.state === 'suspended') actx.resume(); },
    startMusic, stopMusic,
    // Speed the music up with the car, but only "slightly" and up to a limit.
    setTempo(speedRatio) {
      const rate = Math.min(1.5, 1 + (speedRatio - 1) * 0.2);  // cap at 1.5x faster
      stepMs = BASE_STEP_MS / rate;
    },
    toggleMute() {
      muted = !muted;
      if (master) master.gain.value = muted ? 0 : 0.18;
      return muted;
    },
    // ---- SFX ----
    sfxHitPerson() { ensure(); const t = actx.currentTime;
      tone(180, t, 0.12, 'sawtooth', 0.3); tone(90, t, 0.18, 'square', 0.3); noise(0.12, 0.18, 700); },
    sfxSiren() { ensure(); const t = actx.currentTime;
      tone(740, t, 0.18, 'square', 0.12); tone(560, t + 0.18, 0.18, 'square', 0.12); },
    sfxCrash() { ensure(); noise(0.45, 0.4, 1600); const t = actx.currentTime;
      tone(120, t, 0.4, 'sawtooth', 0.25); },
    sfxMoney() { ensure(); const t = actx.currentTime;   // cha-ching!
      tone(880, t, 0.08, 'square', 0.18); tone(1320, t + 0.08, 0.14, 'square', 0.18); },
    sfxBusted() { ensure(); const t = actx.currentTime;
      tone(440, t, 0.18, 'square', 0.2); tone(330, t + 0.18, 0.18, 'square', 0.2);
      tone(220, t + 0.36, 0.4, 'square', 0.2); }
  };
})();

// ============================================================
//  GAME STATE
// ============================================================
let keys = {};
let state = 'start';        // start | playing | dead
let score = 0;
let best = 0;
const BASE_SPEED = 2.5;     // starting scroll speed
let speed = BASE_SPEED;     // world scroll speed (grows over time)
let dashOffset = 0;

let heat = 0;               // police speed bonus, grows per person hit
let peopleHit = 0;

const player = {
  x: W / 2 - 16,
  y: Math.round(H * 0.40),   // car sits ahead (upper part of screen)
  w: 32, h: 56,
  color: '#e74c3c'
};

let people = [];
let obstacles = [];
let police = [];
let money = [];

let spawnPedTimer = 0;
let spawnObsTimer = 0;
let spawnMoneyTimer = 0;
let frame = 0;
let deathReason = '';

// ============================================================
//  INPUT
// ============================================================
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (['arrowleft','arrowright','arrowup','arrowdown',' '].includes(k)) e.preventDefault();
  if (k === 'm') { setMuteIcon(Audio.toggleMute()); }
  if (state !== 'playing' && (k === ' ' || k === 'enter')) startGame();
  else if (state !== 'playing') Audio.resume();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function bindHold(id, key) {
  const b = document.getElementById(id);
  const on = e => { e.preventDefault(); keys[key] = true; if (state !== 'playing') startGame(); };
  const off = e => { e.preventDefault(); keys[key] = false; };
  b.addEventListener('mousedown', on);
  b.addEventListener('touchstart', on, {passive:false});
  b.addEventListener('mouseup', off);
  b.addEventListener('mouseleave', off);
  b.addEventListener('touchend', off, {passive:false});
}
bindHold('leftBtn', 'arrowleft');
bindHold('rightBtn', 'arrowright');

const muteBtn = document.getElementById('muteBtn');
function setMuteIcon(m) { muteBtn.textContent = m ? '🔇' : '🔊'; }
muteBtn.addEventListener('click', e => { e.stopPropagation(); Audio.resume(); setMuteIcon(Audio.toggleMute()); });

canvas.addEventListener('mousedown', () => { if (state !== 'playing') startGame(); });
canvas.addEventListener('touchstart', () => { if (state !== 'playing') startGame(); }, {passive:true});

function startGame() {
  Audio.resume();
  Audio.startMusic();
  state = 'playing';
  score = 0;
  speed = BASE_SPEED;
  heat = 0;
  peopleHit = 0;
  people = [];
  obstacles = [];
  police = [];
  money = [];
  spawnPedTimer = 70;
  spawnObsTimer = 120;
  spawnMoneyTimer = 200;
  frame = 0;
  player.x = W / 2 - player.w / 2;
}

// ============================================================
//  SPAWNING
// ============================================================
function randRoadX(width) {
  return ROAD_X + 10 + Math.random() * (ROAD_W - 20 - width);
}

function spawnPed() {
  people.push({
    x: randRoadX(20), y: -40, w: 20, h: 30,
    shirt: ['#3498db','#9b59b6','#1abc9c','#f1c40f','#e67e22'][Math.floor(Math.random()*5)],
    hit: false
  });
}

function spawnObstacle() {
  const isRock = Math.random() < 0.5;
  const onLeft = Math.random() < 0.5;
  const w = isRock ? 44 : 40;
  const x = onLeft ? ROAD_X + 6 : ROAD_R - 6 - w;
  obstacles.push({ x, y: -60, w, h: isRock ? 36 : 54, type: isRock ? 'rock' : 'palm' });
}

function spawnMoney() {
  const w = 28;
  money.push({ x: randRoadX(w), y: -40, w, h: 20, bob: Math.random() * Math.PI * 2 });
}

function spawnPolice() {
  police.push({
    x: Math.random() < 0.5 ? ROAD_X + 20 : ROAD_R - 52,
    y: H + 40,            // comes from behind (below the screen)
    w: 32, h: 56,
    flash: 0, life: 0, crashed: false, giveUp: false
  });
  Audio.sfxSiren();
}

// ============================================================
//  HELPERS
// ============================================================
function hit(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ============================================================
//  UPDATE
// ============================================================
function update() {
  if (state !== 'playing') return;
  frame++;
  score += 1;
  // Speed doubles roughly every 50s (3000 frames @ 60fps), and keeps doubling.
  speed = BASE_SPEED * Math.pow(2, frame / 3000);
  Audio.setTempo(speed / BASE_SPEED);    // music speeds up with the car (capped)
  if (heat > 0) heat = Math.max(0, heat - 0.0006); // slowly cool down
  dashOffset = (dashOffset + speed) % 40;

  // Steering
  const steer = 4.2;
  if (keys['arrowleft'] || keys['a']) player.x -= steer;
  if (keys['arrowright'] || keys['d']) player.x += steer;
  player.x = clamp(player.x, ROAD_X + 2, ROAD_R - player.w - 2);

  // Spawn timers. Obstacles get denser over time (difficulty grows ~1 per minute).
  const diff = 1 + frame / 3600;
  if (--spawnPedTimer <= 0) { spawnPed(); spawnPedTimer = 80 + Math.random() * 80; }
  if (--spawnObsTimer <= 0) {
    spawnObstacle();
    spawnObsTimer = Math.max(45, (150 + Math.random() * 120) / diff);
  }
  if (--spawnMoneyTimer <= 0) { spawnMoney(); spawnMoneyTimer = 260 + Math.random() * 220; }

  // Pedestrians
  for (const p of people) {
    p.y += speed;
    p.x += Math.sin((frame + p.y) * 0.1) * 0.5;
    if (!p.hit && hit(player, p)) {
      p.hit = true;
      peopleHit++;
      heat += 0.35;                 // police get faster for every person hit
      score += 25;
      Audio.sfxHitPerson();
      // Only ever one cop: the first hit dispatches it; later hits just add
      // heat (the heat term in `approach` makes that one cop chase faster).
      if (police.length === 0) spawnPolice();
    }
  }
  people = people.filter(p => p.y < H + 40 && !(p.hit && p.y > player.y + 30));

  // Obstacles
  for (const o of obstacles) {
    o.y += speed;
    if (hit(player, o)) {
      Audio.sfxCrash();
      gameOver(o.type === 'rock' ? 'You smashed into a rock! 🪨' : 'You hit a palm tree! 🌴');
      return;
    }
  }
  obstacles = obstacles.filter(o => o.y < H + 60);

  // Money — drive over a pile of bills to grab a bonus
  for (const m of money) {
    m.y += speed;
    if (!m.taken && hit(player, m)) {
      m.taken = true;
      score += 150;
      Audio.sfxMoney();
    }
  }
  money = money.filter(m => m.y < H + 40 && !m.taken);

  // Police — chase from behind (below), homing toward the player
  for (const cop of police) {
    cop.flash++;
    if (cop.crashed) { cop.y += speed; continue; }       // wreck scrolls away
    if (cop.giveUp) { cop.y += speed * 1.4; continue; }  // backing off, drifts away

    cop.life++;
    if (cop.life > 720) { cop.giveUp = true; continue; } // gives up after ~12s

    const approach = 0.35 + heat;       // closes the gap; faster with more heat
    cop.y -= approach;
    cop.y = Math.max(cop.y, player.y + 6);   // sits just behind, never ahead
    cop.x += clamp((player.x - cop.x) * 0.06, -2.4, 2.4);
    cop.x = clamp(cop.x, ROAD_X + 2, ROAD_R - cop.w - 2);

    // Cop crashes into an obstacle -> you shake it off
    for (const o of obstacles) {
      if (hit(cop, o)) {
        cop.crashed = true;
        score += 300;
        heat = Math.max(0, heat - 0.5);
        Audio.sfxCrash();
        break;
      }
    }
    // Cop rams you -> busted
    if (!cop.crashed && hit(player, cop)) { Audio.sfxBusted(); gameOver('The police busted you! 🚓'); return; }
  }
  police = police.filter(c => c.y < H + 80 && c.y > -120);

  // Looping siren while a cop is actively chasing
  const chasing = police.some(c => !c.crashed && !c.giveUp);
  if (chasing && frame % 48 === 0) Audio.sfxSiren();
}

function gameOver(reason) {
  state = 'dead';
  best = Math.max(best, score);
  deathReason = reason;
  Audio.stopMusic();
}

// ============================================================
//  DRAWING  (paint-like)
// ============================================================
function drawRoad() {
  ctx.fillStyle = '#6ab04c';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#5aa03c';
  for (let i = 0; i < 8; i++) {
    const gy = ((i * 90 + dashOffset * 2) % (H + 40)) - 20;
    ctx.beginPath();
    ctx.ellipse(20, gy, 12, 8, 0, 0, Math.PI * 2);
    ctx.ellipse(W - 25, gy + 45, 14, 9, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#555';
  ctx.fillRect(ROAD_X, 0, ROAD_W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(ROAD_X, 0, 6, H);
  ctx.fillRect(ROAD_R - 6, 0, 6, H);
  ctx.fillStyle = '#f1c40f';
  for (let y = -40 + dashOffset; y < H; y += 40) {
    ctx.fillRect(W / 2 - 3, y, 6, 22);
  }
}

function drawCar(c, body) {
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.fillStyle = body;
  ctx.fillRect(0, 0, c.w, c.h);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, c.w, c.h);
  ctx.fillStyle = '#bde3ff';
  ctx.fillRect(4, 6, c.w - 8, 12);
  ctx.fillRect(4, c.h - 20, c.w - 8, 12);
  ctx.fillStyle = '#111';
  ctx.fillRect(-4, 8, 4, 14);
  ctx.fillRect(c.w, 8, 4, 14);
  ctx.fillRect(-4, c.h - 22, 4, 14);
  ctx.fillRect(c.w, c.h - 22, 4, 14);
  ctx.restore();
}

function drawPolice(cop) {
  drawCar(cop, cop.crashed ? '#7f8c8d' : '#ffffff');
  ctx.save();
  ctx.translate(cop.x, cop.y);
  const on = Math.floor(cop.flash / 6) % 2 === 0;
  const barY = cop.h / 2 - 4;
  const halfBar = (cop.w - 12) / 2;
  ctx.fillStyle = on ? '#e74c3c' : '#2980d9';
  ctx.fillRect(6, barY, halfBar, 8);
  ctx.fillStyle = on ? '#2980d9' : '#e74c3c';
  ctx.fillRect(6 + halfBar, barY, halfBar, 8);
  if (cop.crashed) {
    ctx.font = '18px sans-serif';
    ctx.fillText('💥', cop.w / 2 - 9, cop.h / 2 + 6);
  }
  ctx.restore();
}

function drawPed(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  if (p.hit) {
    ctx.font = '20px sans-serif';
    ctx.fillText('💢', -2, 16);
    ctx.restore();
    return;
  }
  ctx.fillStyle = '#f0c27b';
  ctx.beginPath();
  ctx.arc(p.w / 2, 6, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = p.shirt;
  ctx.fillRect(p.w / 2 - 7, 11, 14, 12);
  ctx.fillStyle = '#34495e';
  ctx.fillRect(p.w / 2 - 6, 23, 5, 9);
  ctx.fillRect(p.w / 2 + 1, 23, 5, 9);
  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  ctx.translate(o.x, o.y);
  if (o.type === 'rock') {
    ctx.fillStyle = '#95a5a6';
    ctx.beginPath();
    ctx.moveTo(2, o.h);
    ctx.lineTo(8, o.h * 0.3);
    ctx.lineTo(o.w * 0.5, 2);
    ctx.lineTo(o.w - 8, o.h * 0.4);
    ctx.lineTo(o.w - 2, o.h);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7f8c8d';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#7f8c8d';
    ctx.fillRect(o.w * 0.3, o.h * 0.5, 6, 4);
  } else {
    ctx.fillStyle = '#8e5a2b';
    ctx.fillRect(o.w / 2 - 4, o.h * 0.4, 8, o.h * 0.6);
    ctx.fillStyle = '#27ae60';
    for (let a = 0; a < 5; a++) {
      const ang = (a / 5) * Math.PI * 2;
      ctx.beginPath();
      ctx.ellipse(o.w / 2 + Math.cos(ang) * 12, o.h * 0.35 + Math.sin(ang) * 8, 13, 6, ang, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#16a085';
    ctx.beginPath();
    ctx.arc(o.w / 2, o.h * 0.35, 7, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawMoney(m) {
  ctx.save();
  // gentle bob so the pile catches the eye
  ctx.translate(m.x, m.y + Math.sin(frame * 0.15 + m.bob) * 2);
  // stack of bills
  for (let i = 2; i >= 0; i--) {
    ctx.fillStyle = i % 2 ? '#1e8449' : '#27ae60';
    ctx.fillRect(i * 2, i * 3, m.w - 4, m.h - 6);
    ctx.strokeStyle = '#145a32';
    ctx.lineWidth = 1;
    ctx.strokeRect(i * 2, i * 3, m.w - 4, m.h - 6);
  }
  ctx.fillStyle = '#f1c40f';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('$', m.w / 2, m.h - 4);
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, 26);
  ctx.fillStyle = '#ffe14d';
  ctx.font = '16px "Comic Sans MS", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 8, 19);
  // wanted stars
  const level = clamp(Math.round(heat / 0.35), 0, 5);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e74c3c';
  ctx.fillText('WANTED ' + (level > 0 ? '★'.repeat(level) : '–'), W / 2, 19);
  ctx.fillStyle = '#ffe14d';
  ctx.textAlign = 'right';
  ctx.fillText('BEST: ' + best, W - 8, 19);
  ctx.textAlign = 'left';
}

function drawOverlay(title, subtitle, sub2) {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffe14d';
  ctx.font = '34px "Comic Sans MS", sans-serif';
  ctx.fillText(title, W / 2, H / 2 - 40);
  ctx.fillStyle = '#fff';
  ctx.font = '16px "Comic Sans MS", sans-serif';
  ctx.fillText(subtitle, W / 2, H / 2 + 4);
  if (sub2) {
    ctx.fillStyle = '#9be39b';
    ctx.fillText(sub2, W / 2, H / 2 + 34);
  }
  ctx.textAlign = 'left';
}

function render() {
  drawRoad();
  for (const m of money) drawMoney(m);
  for (const o of obstacles) drawObstacle(o);
  for (const p of people) drawPed(p);
  for (const cop of police) drawPolice(cop);
  if (state === 'playing' || state === 'dead') drawCar(player, player.color);
  drawHUD();

  if (state === 'start') {
    drawOverlay('GTA MEGADRIVE', 'Steer ◀ ▶ — cops chase from behind', 'Press SPACE / tap to drive');
  } else if (state === 'dead') {
    drawOverlay('BUSTED!', deathReason, 'Score ' + score + ' — Press SPACE to retry');
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
